# Serves the built SPA on :8080 and reverse-proxies /api to the api service.
# SPA history fallback routes unknown paths back to index.html.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API + SSE proxy. The api service listens on :8000 inside the compose
    # network. Buffering off so the job-monitor SSE stream flushes live.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # SPA client-side routing fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Lightweight container healthcheck target.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
